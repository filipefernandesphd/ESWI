# Publica o hub (site/index.html) + os slides do MeuPlano.AI no GitHub Pages.
#
# Pré-requisito: Settings -> Pages -> Source: "GitHub Actions"

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Montar o hub
        run: |
          # Carrega as variáveis da disciplina (raiz do repo). REPO_SLUG cai para
          # o repositório atual se o .env não existir ou não definir o valor.
          if [ -f .env ]; then set -a; . ./.env; set +a; fi
          REPO_SLUG="${REPO_SLUG:-${{ github.repository }}}"
          REPO_URL="${REPO_URL:-https://github.com/${REPO_SLUG}}"

          mkdir -p _site
          cp -r site/* _site/
          sed -i \
            -e "s#__REPO_SLUG__#${REPO_SLUG}#g" \
            -e "s#__REPO_URL__#${REPO_URL}#g" \
            -e "s#__CURSO__#${CURSO}#g" \
            -e "s#__NOME_DISCIPLINA__#${NOME_DISCIPLINA}#g" \
            -e "s#__CODIGO_DISCIPLINA__#${CODIGO_DISCIPLINA}#g" \
            -e "s#__NOME_PROFESSOR__#${NOME_PROFESSOR}#g" \
            -e "s#__INSTITUICAO__#${INSTITUICAO}#g" \
            _site/index.html

      - name: Buildar slides do MeuPlano.AI (se existirem)
        run: |
          if [ -f apps/meuplano.ai/slides/package.json ]; then
            echo "Projeto Slidev encontrado — buildando."
            cd apps/meuplano.ai/slides
            # 'npm install' (não 'npm ci'): o tema slidev-theme-mint@0.1.0 é da era
            # do Slidev 0.x e gera um lockfile que o 'npm ci' estrito rejeita.
            npm install --no-audit --no-fund
            npx slidev build \
              --base "/${{ github.event.repository.name }}/meuplano-slides/" \
              --out dist
            mkdir -p "$GITHUB_WORKSPACE/_site/meuplano-slides"
            cp -r dist/* "$GITHUB_WORKSPACE/_site/meuplano-slides/"
          else
            echo "Slides ainda não existem em apps/meuplano.ai/slides — pulando."
          fi

      - name: Upload do artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
