# Publica o hub (site/index.html) + os slides do MeuPlano.AI no GitHub Pages.
#
# Pré-requisito: Settings -> Pages -> Source: "GitHub Actions"

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Montar o hub
        run: |
          mkdir -p _site
          cp -r site/* _site/
          sed -i "s#__REPO_SLUG__#${{ github.repository }}#g" _site/index.html

      - name: Buildar slides do MeuPlano.AI (se existirem)
        run: |
          if [ -f apps/meuplano.ai/slides/package.json ]; then
            echo "Projeto Slidev encontrado — buildando."
            cd apps/meuplano.ai/slides
            npm ci
            npx slidev build \
              --base "/${{ github.event.repository.name }}/meuplano-slides/" \
              --out dist
            mkdir -p "$GITHUB_WORKSPACE/_site/meuplano-slides"
            cp -r dist/* "$GITHUB_WORKSPACE/_site/meuplano-slides/"
          else
            echo "Slides ainda não existem em apps/meuplano.ai/slides — pulando."
          fi

      - name: Upload do artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
